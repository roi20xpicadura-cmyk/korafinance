name: Build Android Release (.aab)

# Roda manualmente em Actions → "Build Android Release (.aab)" → Run workflow
on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (ex: 1.0.1) — opcional, só pra label'
        required: false
        default: ''

jobs:
  build:
    name: Build signed AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build web bundle (Vite)
        run: npm run build

      - name: Add Android platform (if missing)
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Capacitor sync
        run: npx cap sync android

      - name: Patch AndroidManifest.xml (deep link OAuth)
        run: |
          # Injeta intent-filter pra capturar o callback OAuth via deep link
          # com.korafinance.app://auth-callback (precisa bater com DEEP_LINK_SCHEME
          # em src/lib/nativeOAuth.ts).
          # Roda DEPOIS do `npx cap add android` / `npx cap sync` que regeneram
          # o Manifest a cada build, então o patch precisa ser idempotente.
          MANIFEST=android/app/src/main/AndroidManifest.xml
          if [ ! -f "$MANIFEST" ]; then
            echo "::error::AndroidManifest.xml não encontrado em $MANIFEST"
            exit 1
          fi

          if grep -q 'android:scheme="com.korafinance.app"' "$MANIFEST"; then
            echo "Intent-filter de deep link já presente — skip."
          else
            echo "Injetando intent-filter de deep link OAuth no Manifest..."
            # Usa Python pra editar o XML de forma confiável (sed em XML é frágil).
            python3 <<'PY'
          import re, sys
          path = "android/app/src/main/AndroidManifest.xml"
          with open(path, "r", encoding="utf-8") as f:
              src = f.read()

          intent_filter = '''
              <intent-filter android:autoVerify="false">
                  <action android:name="android.intent.action.VIEW" />
                  <category android:name="android.intent.category.DEFAULT" />
                  <category android:name="android.intent.category.BROWSABLE" />
                  <data android:scheme="com.korafinance.app" android:host="auth-callback" />
              </intent-filter>
          '''

          # Insere ANTES do </activity> da MainActivity
          pattern = re.compile(r'(<activity[^>]*android:name=".MainActivity"[^>]*>)(.*?)(</activity>)', re.DOTALL)
          m = pattern.search(src)
          if not m:
              print("::error::Não encontrei <activity ... .MainActivity ...> no Manifest", file=sys.stderr)
              sys.exit(1)

          new_activity = m.group(1) + m.group(2) + intent_filter + m.group(3)
          out = src[:m.start()] + new_activity + src[m.end():]

          with open(path, "w", encoding="utf-8") as f:
              f.write(out)
          print("Intent-filter OAuth injetado com sucesso.")
          PY
          fi

          echo "--- AndroidManifest.xml (intent-filters da MainActivity) ---"
          grep -A 1 "intent-filter\|<data\|<action android:name=\"android.intent" "$MANIFEST" | head -60

      - name: Bump versionCode and versionName
        run: |
          # versionCode = GITHUB_RUN_NUMBER + OFFSET
          # OFFSET garante que ficamos acima do maior versionCode já enviado à Play Store.
          # Última rejeição: versionCode 12 já usado → começamos de 100 pra ter folga.
          VERSION_CODE_OFFSET=100
          NEW_VERSION_CODE=$((GITHUB_RUN_NUMBER + VERSION_CODE_OFFSET))
          NEW_VERSION_NAME="${{ inputs.version_name }}"
          if [ -z "$NEW_VERSION_NAME" ]; then NEW_VERSION_NAME="1.0.${NEW_VERSION_CODE}"; fi

          echo "Setting versionCode=$NEW_VERSION_CODE versionName=$NEW_VERSION_NAME"

          # Substitui no build.gradle gerado pelo Capacitor
          sed -i "s/versionCode [0-9]\+/versionCode ${NEW_VERSION_CODE}/" android/app/build.gradle
          sed -i "s/versionName \"[^\"]*\"/versionName \"${NEW_VERSION_NAME}\"/" android/app/build.gradle

          echo "--- build.gradle (relevant lines) ---"
          grep -E "versionCode|versionName" android/app/build.gradle

      - name: Decode and validate keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          set +e
          if [ -z "$KEYSTORE_BASE64" ]; then echo "::error::Secret ANDROID_KEYSTORE_BASE64 não configurado"; exit 1; fi
          if [ -z "$KEYSTORE_PASSWORD" ]; then echo "::error::Secret ANDROID_KEYSTORE_PASSWORD não configurado"; exit 1; fi
          if [ -z "$KEY_ALIAS" ]; then echo "::error::Secret ANDROID_KEY_ALIAS não configurado"; exit 1; fi

          echo "Tamanho do secret base64 (chars): $(printf '%s' "$KEYSTORE_BASE64" | wc -c)"

          mkdir -p android/app
          # -i ignora caracteres inválidos (newlines, espaços) que costumam vir colados no secret
          printf '%s' "$KEYSTORE_BASE64" | base64 -d -i > android/app/release.keystore 2> /tmp/b64.err
          B64_RC=$?
          if [ $B64_RC -ne 0 ] || [ ! -s android/app/release.keystore ]; then
            echo "::error::Falha ao decodificar o keystore (rc=$B64_RC). O secret ANDROID_KEYSTORE_BASE64 provavelmente não é base64 válido."
            echo "Stderr do base64:"; cat /tmp/b64.err || true
            exit 1
          fi

          echo "Keystore decodificado:"
          ls -lh android/app/release.keystore
          file android/app/release.keystore || true

          # Lista TODOS os aliases (sem filtrar) para diagnóstico, sem expor a senha
          echo "Tentando listar aliases do keystore..."
          keytool -list -keystore android/app/release.keystore -storepass "$KEYSTORE_PASSWORD" > /tmp/kt.out 2> /tmp/kt.err
          KT_RC=$?
          echo "--- saída do keytool ---"
          cat /tmp/kt.out || true
          echo "--- stderr do keytool ---"
          cat /tmp/kt.err || true
          echo "------------------------"
          if [ $KT_RC -ne 0 ]; then
            echo "::error::keytool falhou (rc=$KT_RC). Geralmente: ANDROID_KEYSTORE_PASSWORD incorreta, ou arquivo não é JKS/PKCS12 válido."
            exit 1
          fi

          # Verifica especificamente o alias informado
          if ! keytool -list -keystore android/app/release.keystore -storepass "$KEYSTORE_PASSWORD" -alias "$KEY_ALIAS" >/dev/null 2> /tmp/kt2.err; then
            echo "::error::Alias '$KEY_ALIAS' não encontrado no keystore (ou senha incorreta). Veja a lista de aliases acima e ajuste o secret ANDROID_KEY_ALIAS."
            cat /tmp/kt2.err || true
            exit 1
          fi
          echo "✅ Keystore e alias validados."

      - name: Configure signing in build.gradle
        run: |
          cat >> android/app/build.gradle <<'EOF'

          android {
              signingConfigs {
                  release {
                      storeFile file('release.keystore')
                      storePassword System.getenv("ANDROID_KEYSTORE_PASSWORD")
                      keyAlias System.getenv("ANDROID_KEY_ALIAS")
                      keyPassword System.getenv("ANDROID_KEY_PASSWORD")
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                      minifyEnabled false
                  }
              }
          }
          EOF

      - name: Build release AAB
        working-directory: android
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew bundleRelease --no-daemon --stacktrace

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab${{ inputs.version_name && format('-{0}', inputs.version_name) || '' }}
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Build summary
        run: |
          echo "### ✅ AAB gerado com sucesso" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Baixe o arquivo na seção **Artifacts** acima ⬆️" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Próximo passo: upload em https://play.google.com/console" >> $GITHUB_STEP_SUMMARY